<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Race Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- QUEEN SELECTION -->
    <div class="page active" id="queenPage">

        <h1>🏁 Drag Race Simulator</h1>

        <h2>Select Your Queens</h2>

        <div id="queenGrid" class="queen-grid"></div>

        <button onclick="goToSetup()">
            Continue →
        </button>

    </div>

    <!-- SEASON SETUP -->
    <div class="page" id="setupPage">

        <h1>Season Setup</h1>

        <input
            type="text"
            id="seasonName"
            placeholder="Season Name"
        >

        <label>Season Format</label>

        <select id="seasonFormat">

            <option>Standard</option>

            <option>All Stars</option>

            <option>Bracket Tournament</option>

        </select>

        <button onclick="goToEpisodes()">
            Continue →
        </button>

    </div>

    <!-- EPISODE CREATOR -->
    <div class="page" id="episodeSetupPage">

        <h1>Episode Setup</h1>

        <input
            type="text"
            id="episodeName"
            placeholder="Episode Name"
        >

        <select id="challengeType">

            <option>Talent Show</option>
            <option>Snatch Game</option>
            <option>Design</option>
            <option>Acting</option>
            <option>Rusical</option>
            <option>Roast</option>

        </select>

        <button onclick="addEpisode()">
            Add Episode
        </button>

        <ul id="episodeList"></ul>

        <button onclick="goToOverview()">
            Continue →
        </button>

    </div>

    <!-- OVERVIEW -->
    <div class="page" id="overviewPage">

        <h1>Season Overview</h1>

        <div id="overview"></div>

        <button onclick="startSeason()">
            Begin Simulation
        </button>

    </div>

    <!-- SIMULATION -->
    <div class="page" id="simulationPage">

        <h1 id="episodeTitle">
            Episode
        </h1>

        <div id="episodeResults"></div>

        <button onclick="simulateEpisode()">
            Simulate Episode
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
