<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Race Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <h1>🏁 Drag Race Simulator</h1>
</div>

<div class="app">

    <!-- SIDEBAR NAV -->
    <div class="sidebar">

        <button onclick="showPage('queenPage')">Queens</button>
        <button onclick="showPage('setupPage')">Season Setup</button>
        <button onclick="showPage('episodeSetupPage')">Episodes</button>
        <button onclick="showPage('overviewPage')">Overview</button>
        <button onclick="showPage('simulationPage')">Simulation</button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- QUEEN SELECTION -->
        <div class="page active" id="queenPage">

            <h2>Select Your Queens</h2>

            <div id="queenGrid" class="queen-grid"></div>

            <button onclick="goToSetup()">Continue →</button>

        </div>

        <!-- SEASON SETUP -->
        <div class="page" id="setupPage">

            <h2>Season Setup</h2>

            <input type="text" id="seasonName" placeholder="Season Name">

            <label>Season Format</label>
            <select id="seasonFormat">
                <option>Standard</option>
                <option>All Stars</option>
                <option>Bracket Tournament</option>
            </select>

            <button onclick="goToEpisodes()">Continue →</button>

        </div>

        <!-- EPISODE SETUP -->
        <div class="page" id="episodeSetupPage">

            <h2>Episode Setup</h2>

            <input type="text" id="episodeName" placeholder="Episode Name">

            <select id="challengeType">
                <option>Talent Show</option>
                <option>Snatch Game</option>
                <option>Design</option>
                <option>Acting</option>
                <option>Rusical</option>
                <option>Roast</option>
            </select>

            <button onclick="addEpisode()">Add Episode</button>

            <ul id="episodeList"></ul>

            <button onclick="goToOverview()">Continue →</button>

        </div>

        <!-- OVERVIEW -->
        <div class="page" id="overviewPage">

            <h2>Season Overview</h2>

            <div id="overview"></div>

            <button onclick="startSeason()">Begin Simulation</button>

        </div>

        <!-- SIMULATION -->
        <div class="page" id="simulationPage">

            <h2 id="episodeTitle">Episode</h2>

            <div class="stage">

                <div id="episodeResults">
                    <p>Press simulate to begin episode.</p>
                </div>

            </div>

            <button onclick="simulateEpisode()">
                Simulate Episode
            </button>

        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
